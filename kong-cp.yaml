# Do not use Kong Ingress Controller
ingressController:
  enabled: false

image:
  repository: kong/kong-gateway
  tag: "3.12.0.0"

secretVolumes:
  - kong-cluster-cert

env:
  role: control_plane
  database: postgres  # HARUS STRING agar migrasi Helm jalan

  # Masukkan detail koneksi yang sensitif ke Secret
  pg_host:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: KONG_PG_HOST
  pg_user:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: KONG_PG_USER
  pg_password:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: KONG_PG_PASSWORD
  pg_database:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: KONG_PG_DATABASE
  pg_ssl:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: KONG_PG_SSL
  pg_ssl_version:
    valueFrom:
      secretKeyRef:
        name: kong-db-secret
        key: KONG_PG_SSL_VERSION

  # Config lainnya
  admin_gui_url: https://kong-manager.gobleh.cloud
  admin_gui_api_url: https://kong-admin.gobleh.cloud
  cluster_cert: /etc/secrets/kong-cluster-cert/tls.crt
  cluster_cert_key: /etc/secrets/kong-cluster-cert/tls.key

  # Enable Logging
  proxy_access_log: /dev/stdout
  admin_access_log: /dev/stdout
  admin_gui_access_log: /dev/stdout
  portal_api_access_log: /dev/stdout
  proxy_error_log: /dev/stderr
  admin_error_log: /dev/stderr
  admin_gui_error_log: /dev/stderr
  portal_api_error_log: /dev/stderr

  # Set Log Level
  log_level: info

  # Set Timezone
  TZ: Asia/Jakarta

enterprise:
  enabled: false

admin:
  enabled: true
  http:
    enabled: true

cluster:
  enabled: true
  tls:
    enabled: true

manager:
  enabled: true

proxy:
  enabled: false