# Do not use Kong Ingress Controller
ingressController:
  enabled: false

# Kong Enterprise
image:
  repository: kong/kong-gateway
  tag: "3.12.0.0"

# If you want use Kong OSS
# https://github.com/Kong/kong/releases
# image:
#   repository: kong/kong
#   tag: "3.9.1"

# Mount the secret created earlier
secretVolumes:
  - kong-cluster-cert

env:
  # Kong Admin API & Manager URL
  admin_gui_url: https://kong-manager.gobleh.cloud
  admin_gui_api_url: https://kong-admin.gobleh.cloud

  # This is a control_plane node
  role: control_plane

  # These certificates are used for control plane / data plane communication
  cluster_cert: /etc/secrets/kong-cluster-cert/tls.crt
  cluster_cert_key: /etc/secrets/kong-cluster-cert/tls.key

  # Enable Logging
  proxy_access_log: /dev/stdout
  admin_access_log: /dev/stdout
  admin_gui_access_log: /dev/stdout
  portal_api_access_log: /dev/stdout
  proxy_error_log: /dev/stderr
  admin_error_log: /dev/stderr
  admin_gui_error_log: /dev/stderr
  portal_api_error_log: /dev/stderr

  # Enable Log Level
  log_level: info

  # Set Timezone
  TZ: Asia/Jakarta

  # Database
  # CHANGE THESE VALUES
  database: postgres
  pg_database: kong
  pg_user: kong
  pg_host: postgres-service.postgres.svc.cluster.local
  pg_ssl: "on"
  pg_ssl_version: tlsv1_3 # <- this is KONG_PG_SSL_VERSION
  pg_password: S3cR3t

# Enterprise functionality
enterprise:
  enabled: false
  # license_secret: kong-enterprise-license

  # The control plane serves the Admin API
admin:
  enabled: true
  http:
    enabled: true

# Clustering endpoints are required in hybrid mode
cluster:
  enabled: true
  tls:
    enabled: true

clustertelemetry:
  enabled: true
  tls:
    enabled: true

manager:
  enabled: true

# These roles will be served by different Helm releases
proxy:
  enabled: false
